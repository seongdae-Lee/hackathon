name: CI - 빌드 및 테스트
# 모든 브랜치 push + master PR 시 자동 실행
# 테스트 실패 시 배포 워크플로우 차단 (branch protection 설정 필요)

on:
  push:
    branches-ignore:
      - master        # master는 deploy-* 워크플로우가 담당
  pull_request:
    branches:
      - master

jobs:
  # ──────────────────────────────────────────
  # 프론트엔드: lint + Jest 단위 테스트 + 빌드
  # ──────────────────────────────────────────
  frontend-ci:
    name: 프론트엔드 CI
    runs-on: ubuntu-latest

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 의존성 설치
        working-directory: frontend
        run: npm ci

      - name: ESLint 검사
        working-directory: frontend
        run: npm run lint

      - name: Jest 단위 테스트 (커버리지 포함)
        working-directory: frontend
        run: npm run test:coverage
        env:
          CI: true

      - name: Next.js 프로덕션 빌드
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://hackathon-api-production-3278.up.railway.app

  # ──────────────────────────────────────────
  # 백엔드: dotnet build + xUnit 단위 테스트
  # ──────────────────────────────────────────
  backend-ci:
    name: 백엔드 CI
    runs-on: ubuntu-latest

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: .NET 9 설정
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: 패키지 복원
        working-directory: backend
        run: dotnet restore

      - name: 빌드 (경고 = 에러로 처리)
        working-directory: backend
        run: dotnet build --no-restore --configuration Release

      - name: xUnit 단위 테스트
        working-directory: backend
        run: dotnet test --no-build --configuration Release --verbosity normal
